version: "3.9"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENVIRONMENT=development
      - AWS_REGION=ap-south-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ENDPOINT_URL=http://localstack:4566
      - DYNAMODB_TABLE=transactions
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/txn-processing
      - SNS_TOPIC_ARN=arn:aws:sns:ap-south-1:000000000000:txn-notifications
      - LOG_LEVEL=debug
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - txn-network

  localstack:
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,sqs,sns,events
      - DEFAULT_REGION=ap-south-1
      - DEBUG=0
    volumes:
      - "./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - txn-network

networks:
  txn-network:
    driver: bridge
